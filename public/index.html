<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JukeBox | Conduct</title>
    <style>
        body {
            background: #0A0A0F;
            color: white;
            font-family: 'SF Pro Rounded', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 230, 242, 0.2);
        }
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 0;
            background: linear-gradient(to bottom, #fff, #00E6F2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glow-btn {
            background: #00E6F2;
            color: black;
            border: none;
            padding: 1rem 2rem;
            border-radius: 100px;
            font-weight: bold;
            margin-top: 2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .glow-btn:hover {
            box-shadow: 0 0 20px #00E6F2;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Conduct</h1>
        <p>London Legend Edition v1.0</p>
        <button class="glow-btn" onclick="alert('Neural Sync Active...')">ENTER BOOTH</button>
    </div>
</body>
</html>
