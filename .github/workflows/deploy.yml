name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload files to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='node_modules'
          path: ./
          remote_path: /home/${{ secrets.DEPLOY_USER }}/repositories/jukebox-london/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_KEY }}

      - name: Install production dependencies and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/${{ secrets.DEPLOY_USER }}/repositories/jukebox-london
            npm ci --omit=dev
            mkdir -p tmp
            touch tmp/restart.txt
